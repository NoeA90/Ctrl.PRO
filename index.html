<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Sistema Operadores</title>

  <style>
    body {
      font-family: Arial;
      background: #111;
      color: #fff;
      padding: 20px;
    }

    .card {
      background: #1e1e1e;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 10px;
    }

    button {
      padding: 10px;
      margin: 5px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .danger { background: #c0392b; color: white; }
    .success { background: #27ae60; color: white; }
    .warning { background: #f39c12; color: black; }
    .secondary { background: #555; color: white; }

    input {
      padding: 10px;
      margin: 5px;
      border-radius: 6px;
      border: none;
    }

    .row {
      display: flex;
      flex-wrap: wrap;
    }

    .novedad {
      background: #2c3e50;
      padding: 10px;
      margin-top: 8px;
      border-radius: 6px;
    }
  </style>
</head>

<body>

<div id="loginCard" class="card">
  <h2>Login</h2>
  <input id="nombre" placeholder="Nombre">
  <input id="pin" placeholder="PIN" type="password">
  <br>
  <button onclick="login()">Ingresar</button>
</div>

<div id="app" style="display:none">

  <div class="card">
    <h2>Turno activo</h2>
    <div id="operadorInfo"></div>
    <button class="secondary" onclick="cerrarSesion()">Cerrar sesión</button>
  </div>

  <div class="card">
    <h3>Acciones rápidas</h3>

    <div class="row">
      <button onclick="ficharIngreso()">Fichar ingreso</button>
      <button onclick="ficharSalida()" class="danger">Fichar salida</button>

      <button onclick="banoInicio()" class="warning">Voy al baño</button>
      <button onclick="banoFin()" class="success">Volví del baño</button>

      <button onclick="fumarInicio()" class="warning">Voy a fumar</button>
      <button onclick="fumarFin()" class="success">Volví de fumar</button>
    </div>
  </div>

  <div class="card" id="novedadesCard">
    <h3>⚠️ Novedades pendientes</h3>
    <div id="novedadesBox">Cargando novedades...</div>
  </div>

</div>

<script>

const URL = "https://script.google.com/macros/s/AKfycbzeVpQRn39hBzPCItnYCsoKddlYFvADoX4Z2_CTvYdi-znHVts_8OX10noLmB3JU4hx/exec";

let operador = null;

async function api(data){
  const r = await fetch(URL, {
    method: "POST",
    body: JSON.stringify(data)
  });
  return await r.json();
}

async function login(){
  const nombre = document.getElementById("nombre").value;
  const pin = document.getElementById("pin").value;

  const r = await api({
    action: "login",
    nombre,
    pin
  });

  if(!r.ok){
    alert(r.error);
    return;
  }

  operador = r.operador;

  document.getElementById("loginCard").style.display = "none";
  document.getElementById("app").style.display = "block";

  document.getElementById("operadorInfo").innerHTML =
    `${operador.nombre} - ${operador.turno} - ${operador.pc}`;

  cargarNovedades();
}

function cerrarSesion(){
  operador = null;
  location.reload();
}

async function ficharIngreso(){
  const r = await api({
    action: "ficharIngreso",
    nombre: operador.nombre
  });

  alert("Ingreso registrado");
}

async function ficharSalida(){
  const r = await api({
    action: "ficharSalida",
    nombre: operador.nombre
  });

  alert("Salida registrada");
}

async function banoInicio(){
  const r = await api({
    action: "banoInicio",
    nombre: operador.nombre
  });

  alert("Inicio baño registrado");
}

async function banoFin(){
  const r = await api({
    action: "banoFin",
    nombre: operador.nombre
  });

  alert("Fin baño registrado");
}

async function fumarInicio(){
  const r = await api({
    action: "fumarInicio",
    nombre: operador.nombre
  });

  alert("Inicio fumar registrado");
}

async function fumarFin(){
  const r = await api({
    action: "fumarFin",
    nombre: operador.nombre
  });

  alert("Fin fumar registrado");
}

async function cargarNovedades(){

  const r = await api({
    action: "getNovedadesPendientes",
    pc: operador.pc
  });

  const box = document.getElementById("novedadesBox");

  if(!r.ok || r.data.length === 0){
    box.innerHTML = "Sin novedades pendientes";
    return;
  }

  let html = "";

  r.data.forEach(n => {
    html += `
      <div class="novedad">
        <b>${n.tipo}</b><br>
        ${n.detalle || ''}<br>
        <small>${n.fecha}</small>
      </div>
    `;
  });

  box.innerHTML = html;

  // 🔥 ALERTA AUTOMÁTICA
  alert("⚠️ Tenés novedades pendientes en tu PC");
}

</script>

</body>
</html>
